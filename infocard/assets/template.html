<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 默认配色 - 可通过 CSS 变量覆盖 */
      --bg: {{BG_COLOR}};
      --card-bg: {{CARD_BG}};
      --text-primary: {{TEXT_PRIMARY}};
      --text-secondary: {{TEXT_SECONDARY}};
      --accent: {{ACCENT_COLOR}};
      --accent-light: {{ACCENT_LIGHT}};
      --border: {{BORDER_COLOR}};
      --highlight-bg: {{HIGHLIGHT_BG}};
      --dark-card: {{DARK_CARD}};
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
    }

    /* 顶部区域 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .header-left {
      flex: 1;
    }

    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .header-tag::before {
      content: "★";
      font-size: 12px;
    }

    .header-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .header-title .highlight {
      color: var(--accent);
    }

    .header-subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 90%;
    }

    .header-right {
      flex-shrink: 0;
      margin-left: 32px;
    }

    .stat-card {
      background: var(--dark-card);
      color: white;
      padding: 20px 28px;
      border-radius: 12px;
      text-align: center;
      min-width: 140px;
    }

    .stat-number {
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* 分隔线 */
    .divider {
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 2px;
      margin: 32px 0;
    }

    /* 内容区域网格 */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    /* 卡片区块 */
    .section-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-number {
      width: 32px;
      height: 32px;
      background: var(--dark-card);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .section-content {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .section-content p {
      margin-bottom: 12px;
    }

    .section-content p:last-child {
      margin-bottom: 0;
    }

    .section-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 高亮框 */
    .highlight-box {
      background: var(--highlight-bg);
      border-left: 4px solid var(--accent);
      padding: 16px 20px;
      border-radius: 0 12px 12px 0;
      margin-top: 16px;
    }

    /* 标签按钮 */
    .tag-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--dark-card);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .tag-button.secondary {
      background: var(--accent);
    }

    .tag-button.accent {
      background: var(--accent);
      color: white;
    }

    /* 列表项 */
    .list-item {
      display: flex;
      gap: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .list-item:last-child {
      margin-bottom: 0;
    }

    /* 选项卡片 */
    .option-card {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .option-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent);
    }

    .option-card.alt::before {
      background: var(--accent-light);
    }

    .option-label {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .option-label.alt {
      background: var(--accent-light);
      color: var(--text-primary);
    }

    .option-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .option-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* 引述区块 */
    .quote-block {
      background: var(--dark-card);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .quote-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .quote-text {
      font-size: 16px;
      line-height: 1.7;
    }

    /* 底部栏 */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid var(--border);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 20px;
    }

    .footer-info {
      display: flex;
      flex-direction: column;
    }

    .footer-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-primary);
    }

    .footer-tag {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .footer-badge {
      background: var(--dark-card);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .footer-brand {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    /* 单列布局 */
    .full-width {
      grid-column: 1 / -1;
    }

    /* ===== 新增布局工具类 ===== */

    /* 3列布局 */
    .content-grid-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    /* 简单 header（无数据指标） */
    .header-simple {
      margin-bottom: 32px;
    }

    .header-simple .header-title {
      margin-top: 12px;
    }

    /* Bullet 列表 */
    .bullet-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .bullet-list li {
      padding: 10px 0 10px 24px;
      position: relative;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .bullet-list li:last-child {
      border-bottom: none;
    }

    .bullet-list li::before {
      content: "●";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 10px;
      top: 13px;
    }

    .bullet-list li strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 带标签特性卡片 */
    .feature-card {
      border-left: 4px solid var(--accent);
      padding: 16px;
      background: var(--bg);
      border-radius: 0 12px 12px 0;
      margin-bottom: 12px;
    }

    .feature-card:last-child {
      margin-bottom: 0;
    }

    .feature-tag {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .feature-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .feature-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* 代码块 */
    .code-block {
      background: #1E293B;
      color: #E2E8F0;
      padding: 20px;
      border-radius: 10px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
    }

    .code-line {
      margin: 4px 0;
    }

    .code-comment {
      color: #64748B;
    }

    .code-command {
      color: #60A5FA;
    }

    .code-string {
      color: #A3E635;
    }

    /* 2x2 网格 */
    .grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-item {
      background: var(--bg);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .grid-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .grid-item p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    /* 对比布局 */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .compare-item {
      background: var(--bg);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid var(--border);
    }

    .compare-item.highlight {
      border-color: var(--accent);
      background: var(--highlight-bg);
    }

    .compare-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .compare-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .compare-list li {
      padding: 6px 0;
      font-size: 14px;
      color: var(--text-secondary);
      padding-left: 16px;
      position: relative;
    }

    .compare-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* 时间线 */
    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent-light);
    }

    .timeline-item {
      position: relative;
      padding-bottom: 20px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 4px;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }

    .timeline-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .timeline-content {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 步骤编号 */
    .step-list {
      counter-reset: step;
      list-style: none;
      padding: 0;
    }

    .step-list li {
      counter-increment: step;
      padding: 16px 0 16px 48px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .step-list li:last-child {
      border-bottom: none;
    }

    .step-list li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 12px;
      width: 32px;
      height: 32px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .step-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .step-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 数据指标卡片 */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 20px 0;
    }

    .metric-item {
      text-align: center;
      padding: 16px;
      background: var(--bg);
      border-radius: 10px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .content-grid,
      .content-grid-3 {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
      }

      .header-right {
        margin-left: 0;
        margin-top: 20px;
      }

      .header-title {
        font-size: 28px;
      }

      .grid-2x2,
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* 自定义 CSS 注入点 */
    {{CUSTOM_CSS}}
  </style>
</head>
<body>
  <div class="container">
    {{CONTENT}}
  </div>
</body>
</html>
